<html>
    <head>
        <style>
            .highlight {
                color: blue;
            }
        </style>
    </head>
    <body>
        <h1 class="highlight">Session 4!</h1>
        <div id="news">
            <h1>Headline!</h1>
            <p id="p1">Martians attack people!</p>
        </div>

        <script>
            console.log(document.getElementsByTagName("h1"));
            console.log(document.getElementsByClassName("highlight"));
            console.log(document.getElementById("news"));
        </script>
        <script>
            // Headline! Martians attack people!
            console.log(document.getElementById("news").textContent);
            console.log(document.getElementById("news").innerHTML);

            document.getElementById("news").innerHTML =
                `<h1>Breaking news!</h1><p id="p1">innerHTML makes it super easy  to set HTML for an element</p>`;

            document.getElementById("p1").textContent = "Content in p";

            console.log(document.getElementById("news").textContent);
            console.log(document.getElementById("news").innerHTML);
            console.log(document.getElementById("p1").innerHTML);
        </script>
    </body>
</html>
